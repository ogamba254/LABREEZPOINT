<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dining | LABREEZPOINT HOTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --burgundy: #8B1A2B; --lime-green: #32CD32; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; }
        .bg-burgundy { background-color: var(--burgundy); }
        .text-lime { color: var(--lime-green); }
        .border-lime { border-color: var(--lime-green); }
        .bg-lime { background-color: var(--lime-green); }

        /* Custom Scrollbar */
        .cart-scroll::-webkit-scrollbar { width: 4px; }
        .cart-scroll::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }

        /* Hide cart on small screens until toggled */
        @media (max-width: 1024px) {
            .cart-sidebar {
                position: fixed;
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                z-index: 1000;
                transform: translateY(calc(100% - 60px));
                transition: transform 0.3s ease-in-out;
            }
            .cart-sidebar.open { transform: translateY(0); }
            .cart-handle { display: flex !important; }
        }
    </style>
</head>
<body class="bg-gray-50 pb-20 lg:pb-0">

    <nav class="bg-burgundy px-4 lg:px-12 py-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <a href="index.html" class="text-white text-xl font-bold tracking-tighter">
            LA <span class="text-lime">BREEZE</span> POINT
        </a>
        <div class="hidden md:flex space-x-6">
            <a href="index.html" class="text-white text-xs uppercase font-bold hover:text-lime transition">Home</a>
            <a href="booking.html" class="text-white text-xs uppercase font-bold hover:text-lime transition">Rooms</a>
            <a href="dining.html" class="text-lime text-xs uppercase font-bold border-b-2 border-lime">Dining</a>
        </div>
        <div class="md:hidden text-white text-2xl">☰</div>
    </nav>
    
    <header class="relative h-[30vh] flex items-center justify-center text-center text-white overflow-hidden">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover brightness-50" alt="Dining Header">
        <div class="relative">
            <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-widest">Culinary Delights</h1>
            <p class="text-sm font-light tracking-widest mt-2 uppercase">Fresh • Local • Gourmet</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-10 lg:flex lg:gap-8">
        
        <div class="lg:w-2/3">
            <div id="menu-display-area" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
                <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            </div>
        </div>

        <div class="lg:w-1/3">
            <div id="cart-sidebar" class="cart-sidebar bg-white lg:bg-neutral-900 lg:text-white rounded-t-3xl lg:rounded-2xl shadow-2xl p-6 lg:sticky lg:top-24 border-t-4 border-burgundy lg:border-none">
                
                <div onclick="toggleCart()" class="cart-handle hidden flex-col items-center mb-4 cursor-pointer">
                    <div class="w-12 h-1 bg-gray-300 rounded-full mb-2"></div>
                    <p class="text-[10px] font-bold uppercase text-gray-500">Tap to view Selection</p>
                </div>

                <h3 class="text-xl font-bold text-burgundy lg:text-lime mb-4 border-b border-gray-100 lg:border-neutral-700 pb-2">Your Selection</h3>
                
                <div class="cart-scroll max-h-[40vh] overflow-y-auto pr-2">
                    <div id="room-selection-display" class="mb-4">
                        </div>
                    <div id="food-items-display" class="space-y-3">
                        </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-200 lg:border-neutral-700">
                    <div class="flex justify-between items-center text-xl font-black">
                        <span class="text-gray-600 lg:text-gray-400">Total:</span>
                        <span class="text-burgundy lg:text-lime">KSH <span id="grand-total">0.00</span></span>
                    </div>
                    <button class="w-full bg-lime hover:bg-green-400 text-black font-black py-4 rounded-xl mt-6 transition-all transform active:scale-95 uppercase tracking-widest shadow-lg" onclick="proceedToPayment()">
                        Confirm Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let rawOrder = localStorage.getItem('currentOrder');
        let order = rawOrder ? JSON.parse(rawOrder) : { rooms: {}, foods: {}, total: 0 };
        if (!order.foods) order.foods = {};
        if (!order.rooms) order.rooms = {};

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        async function fetchMenu() {
            try {
                const response = await fetch(`${API_URL}/api/services`);
                const services = await response.json();
                const menuArea = document.getElementById('menu-display-area');
                menuArea.innerHTML = '';
                const meals = services.filter(s => s.type === 'food');
                
                meals.forEach((meal, index) => {
                    const photos = Array.isArray(meal.photos) ? meal.photos : [meal.photos];
                    const mainImg = photos[0] || 'https://via.placeholder.com/400x300';

                    menuArea.innerHTML += `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300 group">
                            <div class="h-48 overflow-hidden relative">
                                <img src="${mainImg}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                                <div class="absolute bottom-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full font-bold text-burgundy shadow-sm">
                                    KSH ${meal.price}
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="font-bold text-lg text-gray-800 capitalize">${meal.name}</h3>
                                <p class="text-gray-500 text-xs mt-1 mb-4 line-clamp-2">${meal.details || 'A chef-curated specialty made with the freshest local ingredients.'}</p>
                                <button class="w-full bg-gray-900 hover:bg-burgundy text-white font-bold py-3 rounded-xl transition-colors active:scale-95" 
                                    onclick="addItem('${meal.name}', ${meal.price})">
                                    Add to Order
                                </button>
                            </div>
                        </div>`;
                });
                updateOrderUI();
            } catch (err) { console.error("Error:", err); }
        }

        function addItem(name, price) {
            if (!order.foods[name]) {
                order.foods[name] = { price: parseFloat(price), qty: 0 };
            }
            order.foods[name].qty += 1;
            saveAndUpdate();
        }

        function reduceItem(name, type) {
            let target = (type === 'food') ? order.foods : order.rooms;
            if (target[name]) {
                target[name].qty -= 1;
                if (target[name].qty <= 0) delete target[name];
            }
            saveAndUpdate();
        }

        function saveAndUpdate() {
            let total = 0;
            for (let r in order.rooms) total += order.rooms[r].price * order.rooms[r].qty;
            for (let f in order.foods) total += order.foods[f].price * order.foods[f].qty;
            
            order.total = total;
            localStorage.setItem('currentOrder', JSON.stringify(order));
            localStorage.setItem('totalToPay', total.toFixed(2));
            updateOrderUI();
        }

        function updateOrderUI() {
            const foodList = document.getElementById('food-items-display');
            const roomList = document.getElementById('room-selection-display');
            
            // Rooms Display
            roomList.innerHTML = '';
            let roomKeys = Object.keys(order.rooms);
            if (roomKeys.length > 0) {
                roomKeys.forEach(name => {
                    roomList.innerHTML += `
                        <div class="flex justify-between items-center bg-lime/10 lg:bg-lime/20 p-3 rounded-lg border-l-4 border-lime mb-2">
                            <span class="text-xs font-bold text-gray-800 lg:text-white truncate pr-2">🏠 ${name} (x${order.rooms[name].qty})</span>
                            <button class="bg-red-500 text-white w-6 h-6 rounded flex items-center justify-center font-bold text-sm" onclick="reduceItem('${name}', 'room')">−</button>
                        </div>`;
                });
            }

            // Food Display
            foodList.innerHTML = '';
            let foodKeys = Object.keys(order.foods);
            foodKeys.forEach(name => {
                const item = order.foods[name];
                foodList.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-100 lg:border-neutral-800 pb-2">
                        <div class="text-sm">
                            <span class="font-bold text-burgundy lg:text-lime mr-2">${item.qty}x</span>
                            <span class="text-gray-700 lg:text-gray-300">${name}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-gray-600 lg:text-gray-400">KSH ${(item.price * item.qty).toFixed(0)}</span>
                            <button class="bg-gray-200 lg:bg-neutral-800 text-gray-600 lg:text-white w-6 h-6 rounded flex items-center justify-center hover:bg-red-500 transition-colors" 
                                onclick="reduceItem('${name}', 'food')">−</button>
                        </div>
                    </div>`;
            });

            if(foodKeys.length === 0 && roomKeys.length === 0) {
                foodList.innerHTML = '<p class="text-center text-gray-400 py-10 italic text-sm">Your selection is empty</p>';
            }

            document.getElementById('grand-total').innerText = order.total.toLocaleString();
        }

        function proceedToPayment() {
            if (order.total <= 0) return alert("Order is empty!");
            window.location.href = 'payment.html';
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
