<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Deliveries | LABREEZPOINT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --burgundy: #8B1A2B; --lime-green: #32CD32; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .bg-burgundy { background-color: var(--burgundy); }
        .text-lime { color: var(--lime-green); }
        .border-lime { border-color: var(--lime-green); }
        .bg-lime { background-color: var(--lime-green); }
        
        /* Custom Scrollbar for Cart */
        .cart-scroll::-webkit-scrollbar { width: 5px; }
        .cart-scroll::-webkit-scrollbar-track { background: #2a2a2a; }
        .cart-scroll::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }

        /* Animation for adding items */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .item-added { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-burgundy px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <a href="index.html" class="text-white text-xl font-bold tracking-tight">
            LA <span class="text-lime">BREEZE</span> POINT
        </a>
        <div class="space-x-4">
            <a href="index.html" class="text-white text-xs uppercase font-bold hover:text-lime-green transition">Home</a>
            <a href="dining.html" class="text-white text-xs uppercase font-bold hover:text-lime-green transition">Dining</a>
        </div>
    </nav>

    <header class="relative h-48 flex items-center justify-center text-center text-white bg-black">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Food Header">
        <h1 class="relative text-4xl font-black italic tracking-widest uppercase">Gourmet Delivery</h1>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8 lg:flex lg:gap-8">
        
        <div class="lg:w-2/3">
            <div class="flex items-center gap-4 mb-8">
                <div class="h-10 w-2 bg-burgundy rounded-full"></div>
                <h2 class="text-3xl font-bold text-gray-900">Explore Menu</h2>
            </div>
            
            <div id="menu-area" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                <div class="animate-pulse flex flex-col space-y-4">
                    <div class="bg-gray-200 h-48 rounded-lg"></div>
                    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                </div>
            </div>
        </div>

        <div class="lg:w-1/3 mt-10 lg:mt-0">
            <div class="bg-neutral-900 text-white p-6 rounded-2xl shadow-2xl sticky top-24">
                <h3 class="text-lime text-xl font-bold mb-4 border-b border-neutral-700 pb-2 flex justify-between">
                    Your Tray <span id="item-count" class="text-sm bg-burgundy px-2 py-1 rounded text-white">0</span>
                </h3>

                <div id="cart-preview" class="cart-scroll max-h-[300px] overflow-y-auto mb-6 space-y-3 pr-2 text-sm">
                    <p class="text-gray-500 italic text-center py-4">Your tray is currently empty...</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-400">Delivery Information</label>
                        <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-sm focus:outline-none focus:border-lime">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="tel" id="cust-phone" placeholder="Phone (e.g. 07...)" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-sm focus:outline-none focus:border-lime">
                        <input type="email" id="cust-email" placeholder="Email" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-sm focus:outline-none focus:border-lime">
                    </div>
                    <input type="text" id="cust-address" placeholder="Room Number or Physical Address" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-sm focus:outline-none focus:border-lime">
                </div>

                <div class="mt-6">
                    <label class="text-[10px] uppercase font-bold text-gray-400">Select Payment</label>
                    <div class="flex gap-2 mt-2">
                        <button id="btn-mpesa" onclick="setMethod('mpesa')" class="flex-1 py-3 rounded-lg border-2 border-lime bg-lime text-black font-bold text-xs transition-all">M-PESA</button>
                        <button id="btn-cod" onclick="setMethod('cod')" class="flex-1 py-3 rounded-lg border-2 border-neutral-700 text-gray-400 font-bold text-xs transition-all">ON DELIVERY</button>
                    </div>
                </div>

                <div class="mt-8 pt-4 border-t border-neutral-700">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-400 font-medium">Total Payable</span>
                        <span id="grand-total" class="text-2xl font-black text-lime">KSH 0</span>
                    </div>
                    <button id="submit-btn" onclick="processOrder()" class="w-full bg-lime hover:bg-green-400 text-black font-black py-4 rounded-xl transition transform active:scale-95 shadow-lg uppercase tracking-widest">
                        Complete Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let order = { foods: {}, total: 0 };
        let paymentMethod = 'mpesa';
        let pollingActive = false;
        let countdownInterval, pollInterval;

        // Initialize EmailJS
        (function() { emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); })();

        async function loadMenu() {
            try {
                const response = await fetch(`${API_URL}/api/services`);
                const services = await response.json();
                const menuArea = document.getElementById('menu-area');
                const foods = services.filter(s => s.type && s.type.toLowerCase().includes('food'));
                
                if (foods.length === 0) {
                    menuArea.innerHTML = "<p class='col-span-full text-center text-gray-400 py-10'>No food items available today.</p>";
                    return;
                }

                menuArea.innerHTML = foods.map(item => `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden group hover:shadow-xl transition-all duration-300">
                        <div class="relative overflow-hidden h-48">
                            <img src="${item.photos?.[0] || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-burgundy font-bold text-sm shadow">
                                KSH ${item.price}
                            </div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-lg text-gray-800 mb-1">${item.name}</h3>
                            <p class="text-gray-500 text-xs mb-4 line-clamp-1">${item.details || 'Freshly prepared gourmet meal'}</p>
                            <button onclick="addToCart('${item.name}', ${item.price})" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-burgundy transition-colors active:scale-95">
                                Add to Tray
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { 
                document.getElementById('menu-area').innerHTML = "<p>Connection Error.</p>";
            }
        }

        function addToCart(name, price) {
            if (!order.foods[name]) {
                order.foods[name] = { price: parseFloat(price), qty: 1 };
            } else {
                order.foods[name].qty += 1;
            }
            updateUI();
        }

        function changeQty(name, delta) {
            order.foods[name].qty += delta;
            if (order.foods[name].qty <= 0) delete order.foods[name];
            updateUI();
        }

        function setMethod(method) {
            paymentMethod = method;
            const mpesaBtn = document.getElementById('btn-mpesa');
            const codBtn = document.getElementById('btn-cod');
            
            if(method === 'mpesa') {
                mpesaBtn.classList.add('bg-lime', 'text-black', 'border-lime');
                codBtn.classList.remove('bg-lime', 'text-black', 'border-lime');
                codBtn.classList.add('text-gray-400', 'border-neutral-700');
            } else {
                codBtn.classList.add('bg-lime', 'text-black', 'border-lime');
                mpesaBtn.classList.remove('bg-lime', 'text-black', 'border-lime');
                mpesaBtn.classList.add('text-gray-400', 'border-neutral-700');
            }
        }

        function updateUI() {
            const preview = document.getElementById('cart-preview');
            let html = ''; let total = 0; let count = 0;
            
            Object.keys(order.foods).forEach(name => {
                const item = order.foods[name];
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                count += item.qty;
                html += `
                <div class="flex justify-between items-center bg-neutral-800/50 p-3 rounded-xl border border-neutral-700/50">
                    <div class="flex-1">
                        <p class="font-bold text-white text-xs">${name}</p>
                        <p class="text-lime text-[10px]">KSH ${itemTotal}</p>
                    </div>
                    <div class="flex items-center gap-3 bg-neutral-900 px-2 py-1 rounded-lg border border-neutral-700">
                        <button onclick="changeQty('${name}', -1)" class="text-lime hover:text-white">-</button>
                        <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty('${name}', 1)" class="text-lime hover:text-white">+</button>
                    </div>
                </div>`;
            });
            
            preview.innerHTML = html || '<p class="text-gray-500 italic text-center py-4">Your tray is empty</p>';
            document.getElementById('grand-total').innerText = `KSH ${total.toLocaleString()}`;
            document.getElementById('item-count').innerText = count;
            order.total = total;
        }

        async function processOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const email = document.getElementById('cust-email').value;
            const address = document.getElementById('cust-address').value;

            if (!name || !phone || !address) return alert("Please provide Name, Phone, and Address!");
            if (order.total === 0) return alert("Your tray is empty!");

            // Format Phone
            let cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.startsWith('0')) cleanPhone = '254' + cleanPhone.substring(1);

            const details = { name, phone: cleanPhone, email, address, total: order.total };
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            if (paymentMethod === 'mpesa') {
                btn.innerText = "Processing M-Pesa...";
                initiateStkPush(details);
            } else {
                btn.innerText = "Ordering...";
                handlePaymentSuccess(details, "Cash on Delivery");
            }
        }

        async function initiateStkPush(details) {
            try {
                const res = await fetch(`${API_URL}/api/mpesa/stkpush`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: details.phone, amount: details.total })
                });
                const result = await res.json();
                if (res.ok && result.data.CheckoutRequestID) {
                    startPaymentMonitoring(result.data.CheckoutRequestID, details);
                } else { throw new Error("Push Failed"); }
            } catch (err) {
                alert("STK Push Failed. Try again.");
                resetSubmitBtn();
            }
        }

        function startPaymentMonitoring(checkoutID, details) {
            const btn = document.getElementById('submit-btn');
            let timeLeft = 60;
            pollingActive = true;

            countdownInterval = setInterval(() => {
                timeLeft--;
                btn.innerText = `PIN REQUESTED (${timeLeft}s)`;
                if (timeLeft <= 0) {
                    stopMonitoring();
                    alert("Timeout. Please try again.");
                    resetSubmitBtn();
                }
            }, 1000);

            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/api/mpesa/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ CheckoutRequestID: checkoutID })
                    });
                    const data = await res.json();
                    if (data.ResultCode == 0) {
                        stopMonitoring();
                        handlePaymentSuccess(details, "M-Pesa Paid");
                    } else if (data.ResultCode) {
                        stopMonitoring();
                        alert("Payment not successful.");
                        resetSubmitBtn();
                    }
                } catch (e) {}
            }, 4000);
        }

        function stopMonitoring() {
            pollingActive = false;
            clearInterval(countdownInterval);
            clearInterval(pollInterval);
        }

        async function handlePaymentSuccess(details, status) {
            // Record to Database
            await fetch(`${API_URL}/api/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    guestName: details.name,
                    guestEmail: details.email,
                    guestPhone: details.phone,
                    paymentMethod: paymentMethod === 'mpesa' ? 'M-Pesa' : 'Cash',
                    paymentStatus: status,
                    totalAmount: details.total,
                    orderDetails: order.foods, // Captures items
                    address: details.address,
                    timestamp: new Date().toISOString()
                })
            });

            // Set Receipt Data for next page
            localStorage.setItem('lastReceipt', JSON.stringify({
                ...details,
                items: order.foods,
                date: new Date().toLocaleString(),
                status: status
            }));

            window.location.href = 'receipt.html';
        }

        function resetSubmitBtn() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            btn.innerText = "Complete Order";
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
