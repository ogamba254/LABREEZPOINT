<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment | LABREEZPOINT</title>
    <style>
        :root {
            --burgundy: #8B1A2B;
            --mpesa-green: #4FB548;
            --lime-green: #32CD32;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .payment-container { 
            max-width: 450px; width: 90%; background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--burgundy);
        }
        
        h3 { color: var(--burgundy); margin-top: 0; text-align: center; }
        .price-display { font-size: 1.5rem; text-align: center; margin: 20px 0; color: #333; }
        .price-display strong { color: var(--burgundy); }

        label { display: block; font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; margin-top: 10px; }
        
        input[type="text"], input[type="email"], input[type="tel"] { 
            width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 1rem;
        }

        .selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .select-btn { 
            flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; 
            text-align: center; font-weight: bold; transition: 0.3s; font-size: 0.9rem;
        }
        .select-btn.active { border-color: var(--burgundy); background: #fff5f6; color: var(--burgundy); }
        .select-btn.mpesa-active { border-color: var(--mpesa-green); background: #f0fff0; color: #2e7d32; }

        .mpesa-badge { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #4FB548;
        }
        .mpesa-badge img { height: 20px; }

        .btn-pay { 
            width: 100%; padding: 15px; background: var(--burgundy); color: white; border: none; 
            font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .btn-pay:hover { background: #6b1421; }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; }

        .hidden { display: none; }
        .secure-note { text-align: center; font-size: 0.75rem; color: #888; margin-top: 15px; }
        #timer { color: var(--burgundy); font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h3>Finalize Your Order</h3>
        <div class="price-display">Total Amount: <strong id="dispTotal">KSH 0</strong></div>
        
        <label>CHOOSE METHOD</label>
        <div class="selector" id="methodSelector">
            <div class="select-btn mpesa-active" id="btnMpesa" onclick="setMethod('M-Pesa')">M-Pesa</div>
            <div class="select-btn" id="btnCash" onclick="setMethod('Cash')">Pay with Cash</div>
        </div>

        <div id="formFields">
            <label>FULL NAME</label>
            <input type="text" id="guestName" placeholder="Full Name">
            
            <label>EMAIL ADDRESS</label>
            <input type="email" id="guestEmail" placeholder="guest@example.com">

            <div id="mpesaFields">
                <label>M-PESA PHONE NUMBER</label>
                <input type="tel" id="guestPhone" placeholder="0712345678">
                <div class="mpesa-badge">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/M-PESA_LOGO-01.svg/1200px-M-PESA_LOGO-01.svg.png" alt="M-Pesa">
                    <span>STK Push Prompt</span>
                </div>
            </div>
        </div>

        <button class="btn-pay" id="payBtn" onclick="processPayment()">Send Payment Prompt</button>
        
        <div class="secure-note" id="note">
            🔒 Safe & Encrypted Transaction.
        </div>
        <div id="timerDisplay" class="hidden" style="text-align: center; margin-top: 10px;">
            Please enter PIN: <span id="timer">90</span>s
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentMethod = 'M-Pesa';
        let pollInterval;
        let countdownInterval;
        
        const total = localStorage.getItem('totalToPay') || 0;
        const currentOrder = JSON.parse(localStorage.getItem('currentOrder')) || {};

        document.getElementById('dispTotal').innerText = "KSH " + total;

        function setMethod(method) {
            currentMethod = method;
            const mpesaFields = document.getElementById('mpesaFields');
            const payBtn = document.getElementById('payBtn');
            const btnM = document.getElementById('btnMpesa');
            const btnC = document.getElementById('btnCash');

            if (method === 'M-Pesa') {
                mpesaFields.classList.remove('hidden');
                btnM.classList.add('mpesa-active');
                btnC.classList.remove('active');
                payBtn.innerText = "Send M-Pesa Prompt";
                payBtn.style.background = "#4FB548";
            } else {
                mpesaFields.classList.add('hidden');
                btnC.classList.add('active');
                btnM.classList.remove('mpesa-active');
                payBtn.innerText = "Record Cash Transaction";
                payBtn.style.background = "#8B1A2B";
            }
        }

        async function processPayment() {
            const guestName = document.getElementById('guestName').value.trim();
            const guestEmail = document.getElementById('guestEmail').value.trim();
            let guestPhone = document.getElementById('guestPhone').value.trim();
            const payBtn = document.getElementById('payBtn');

            if (!guestName || !guestEmail || (currentMethod === 'M-Pesa' && !guestPhone)) {
                alert("Please fill in all required fields.");
                return;
            }

            if (currentMethod === 'M-Pesa') {
                guestPhone = guestPhone.replace(/\D/g, '');
                if (guestPhone.startsWith('0')) guestPhone = '254' + guestPhone.substring(1);
                else if (!guestPhone.startsWith('254')) guestPhone = '254' + guestPhone;
            }

            payBtn.innerText = "Initiating...";
            payBtn.disabled = true;

            try {
                if (currentMethod === 'M-Pesa') {
                    // UPDATED: Used API_URL from config.js
                    const stkRes = await fetch(`${API_URL}/api/mpesa/stkpush`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phoneNumber: guestPhone, amount: Math.round(total) })
                    });

                    const stkData = await stkRes.json();
                    if (!stkRes.ok) throw new Error(stkData.message || "M-Pesa prompt failed.");

                    startTracking(stkData.data.CheckoutRequestID, { guestName, guestEmail, guestPhone });
                } else {
                    saveAndRedirect({ guestName, guestEmail, guestPhone, method: 'Cash' });
                }
            } catch (error) {
                alert("Error: " + error.message);
                payBtn.disabled = false;
                payBtn.innerText = "Retry Payment";
            }
        }

        function startTracking(checkoutID, userData) {
            document.getElementById('timerDisplay').classList.remove('hidden');
            document.getElementById('methodSelector').classList.add('hidden');
            document.getElementById('formFields').classList.add('hidden');
            document.getElementById('payBtn').innerText = "Waiting for PIN...";

            let timeLeft = 90;
            const timerElem = document.getElementById('timer');

            countdownInterval = setInterval(() => {
                timeLeft--;
                timerElem.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    clearInterval(pollInterval);
                    alert("Payment timed out. Please check your phone or try again.");
                    location.reload();
                }
            }, 1000);

            pollInterval = setInterval(async () => {
                try {
                    // UPDATED: Used API_URL from config.js
                    const res = await fetch(`${API_URL}/api/mpesa/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ CheckoutRequestID: checkoutID })
                    });
                    const data = await res.json();

                    // FIX: Only cancel if user actually clicks Cancel (1032) or other terminal errors
                    // We ignore "In Progress" codes so the prompt doesn't close prematurely
                    if (data.ResultCode === "0") { 
                        clearInterval(pollInterval);
                        clearInterval(countdownInterval);
                        saveAndRedirect({ ...userData, method: 'M-Pesa' });
                    } else if (data.ResultCode === "1032") { 
                        clearInterval(pollInterval);
                        clearInterval(countdownInterval);
                        alert("Transaction Cancelled by user.");
                        location.reload();
                    } else if (data.ResultCode && data.ResultCode !== "0" && data.ResultCode !== "999") {
                        // Handle other specific failure codes like Insufficient Funds
                        clearInterval(pollInterval);
                        clearInterval(countdownInterval);
                        alert("Payment Failed: " + (data.ResultDesc || "Unknown Error"));
                        location.reload();
                    }
                } catch (e) { console.log("Still waiting for Safaricom..."); }
            }, 3000);
        }

        async function saveAndRedirect(data) {
            const bookingData = {
                guestName: data.guestName,
                guestEmail: data.guestEmail,
                guestPhone: data.guestPhone,
                paymentMethod: data.method,
                paymentStatus: "Completed",
                orderDetails: currentOrder, 
                totalAmount: parseFloat(total),
                timestamp: new Date().toISOString()
            };

            try {
                // UPDATED: Used API_URL from config.js
                const response = await fetch(`${API_URL}/api/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });

                if (!response.ok) throw new Error("Could not save booking");

                localStorage.setItem('lastTransaction', JSON.stringify(bookingData));
                window.location.href = 'receipt.html';
            } catch (err) {
                alert("Payment received, but there was an error saving your booking. Please contact support.");
            }
        }
        
        window.onload = () => setMethod('M-Pesa');
    </script>
</body>
</html>
