<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="zHjmamyXtQn_F0yn2_h66vIkiV7Bo4IY06zDnD5ir70" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | LABREEZPOINT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --burgundy: #8B1A2B; --mpesa-green: #4FB548; }
        .bg-burgundy { background-color: var(--burgundy); }
        .text-burgundy { color: var(--burgundy); }
        .border-burgundy { border-color: var(--burgundy); }
        .bg-mpesa { background-color: var(--mpesa-green); }
        .border-mpesa { border-color: var(--mpesa-green); }
        #payment-status-box { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-burgundy p-6 text-center text-white">
            <h3 class="text-xl font-black uppercase tracking-widest italic">Secure Checkout</h3>
            <div class="mt-4 bg-black/20 rounded-full py-2 px-4 inline-block">
                <span class="text-xs text-white/80 uppercase font-bold">Total Payable:</span>
                <span id="dispTotal" class="ml-2 text-lg font-black text-white">KSH 0</span>
            </div>
        </div>

        <div class="p-6 md:p-8">
            <div id="method-container">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 block">Select Payment Method</label>
                <div class="flex gap-3 mb-8" id="methodSelector">
                    <button id="btnMpesa" onclick="setMethod('M-Pesa')" class="flex-1 py-4 rounded-2xl border-2 border-mpesa bg-green-50 text-green-700 font-bold text-sm transition-all flex flex-col items-center gap-1">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/M-PESA_LOGO-01.svg/1200px-M-PESA_LOGO-01.svg.png" class="h-4" alt="M-Pesa">
                        M-Pesa
                    </button>
                    <button id="btnCash" onclick="setMethod('Cash')" class="flex-1 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 text-gray-500 font-bold text-sm transition-all flex flex-col items-center gap-1">
                        <span class="text-lg">💵</span>
                        Cash / POD
                    </button>
                </div>
            </div>

            <div id="formFields" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" id="guestName" placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-burgundy/20 focus:border-burgundy transition-all">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Email Receipt To</label>
                    <input type="email" id="guestEmail" placeholder="email@example.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-burgundy/20 focus:border-burgundy transition-all">
                </div>

                <div id="mpesaFields">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">M-Pesa Number</label>
                    <input type="tel" id="guestPhone" placeholder="07XX XXX XXX" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-mpesa/20 focus:border-mpesa transition-all">
                </div>
            </div>

            <div id="payment-status-box" class="hidden text-center py-8">
                <div class="inline-block p-6 rounded-full bg-burgundy/10 mb-4">
                    <svg class="animate-spin h-10 w-10 text-burgundy" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
                <h4 class="text-xl font-black text-gray-800 italic">Check Your Phone</h4>
                <p class="text-sm text-gray-500 mt-2 px-6">Please enter your M-Pesa PIN to complete the transaction.</p>
                <div class="mt-6 text-2xl font-mono font-bold text-burgundy" id="timer">90s</div>
            </div>

            <button id="payBtn" onclick="processPayment()" class="w-full mt-8 bg-burgundy hover:bg-red-900 text-white font-black py-5 rounded-2xl transition transform active:scale-95 shadow-xl uppercase tracking-widest">
                Send Payment Prompt
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentMethod = 'M-Pesa';
        let pollInterval, countdownInterval;
        const total = localStorage.getItem('totalToPay') || 0;
        const currentOrder = JSON.parse(localStorage.getItem('currentOrder')) || {};

        document.getElementById('dispTotal').innerText = "KSH " + parseFloat(total).toLocaleString();

        function setMethod(method) {
            currentMethod = method;
            const mpesaFields = document.getElementById('mpesaFields');
            const payBtn = document.getElementById('payBtn');
            const btnM = document.getElementById('btnMpesa');
            const btnC = document.getElementById('btnCash');

            if (method === 'M-Pesa') {
                mpesaFields.style.display = 'block';
                btnM.classList.replace('border-gray-100', 'border-mpesa');
                btnM.classList.replace('text-gray-500', 'text-green-700');
                btnC.classList.replace('border-burgundy', 'border-gray-100');
                btnC.classList.replace('text-burgundy', 'text-gray-500');
                payBtn.innerText = "Send M-Pesa Prompt";
                payBtn.style.backgroundColor = '#4FB548';
            } else {
                mpesaFields.style.display = 'none';
                btnC.classList.replace('border-gray-100', 'border-burgundy');
                btnC.classList.replace('text-gray-500', 'text-burgundy');
                btnM.classList.replace('border-mpesa', 'border-gray-100');
                btnM.classList.replace('text-green-700', 'text-gray-500');
                payBtn.innerText = "Record Cash Transaction";
                payBtn.style.backgroundColor = '#8B1A2B';
            }
        }

        async function processPayment() {
            const guestName = document.getElementById('guestName').value.trim();
            const guestEmail = document.getElementById('guestEmail').value.trim();
            let guestPhone = document.getElementById('guestPhone').value.trim();
            const payBtn = document.getElementById('payBtn');

            if (!guestName || !guestEmail || (currentMethod === 'M-Pesa' && !guestPhone)) {
                return alert("Please fill in all fields.");
            }

            payBtn.innerText = "Initiating...";
            payBtn.disabled = true;

            if (currentMethod === 'M-Pesa') {
                guestPhone = guestPhone.replace(/\D/g, '');
                if (guestPhone.startsWith('0')) guestPhone = '254' + guestPhone.substring(1);
                else if (!guestPhone.startsWith('254')) guestPhone = '254' + guestPhone;

                try {
                    const stkRes = await fetch(`${API_URL}/api/mpesa/stkpush`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phoneNumber: guestPhone, amount: Math.round(total) })
                    });
                    const stkData = await stkRes.json();
                    if (!stkRes.ok) throw new Error(stkData.message || "STK Push failed.");
                    startTracking(stkData.data.CheckoutRequestID, { guestName, guestEmail, guestPhone });
                } catch (error) {
                    alert(error.message);
                    payBtn.disabled = false;
                    payBtn.innerText = "Retry Payment";
                }
            } else {
                saveAndRedirect({ guestName, guestEmail, guestPhone: "CASH_CUSTOMER", method: 'Cash' });
            }
        }

        function startTracking(checkoutID, userData) {
            document.getElementById('method-container').classList.add('hidden');
            document.getElementById('formFields').classList.add('hidden');
            document.getElementById('payBtn').classList.add('hidden');
            document.getElementById('payment-status-box').classList.remove('hidden');

            let timeLeft = 90;
            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    stopMonitoring();
                    alert("Timeout. Please check your phone and try again.");
                    location.reload();
                }
            }, 1000);

            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/api/mpesa/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ CheckoutRequestID: checkoutID })
                    });
                    const data = await res.json();

                    // IF SUCCESS (0): Stop and redirect
                    if (data.ResultCode === "0") { 
                        stopMonitoring();
                        saveAndRedirect({ ...userData, method: 'M-Pesa' });
                    } 
                    // IF CANCELLED BY USER (1032): Stop and reset
                    else if (data.ResultCode === "1032") { 
                        stopMonitoring();
                        alert("Transaction cancelled by user.");
                        location.reload();
                    }
                    // ELSE: Ignore internal Safaricom errors and continue polling
                    else {
                        console.log("Transaction still processing...");
                    }
                } catch (e) { 
                    console.log("Waiting for PIN entry or Safaricom response..."); 
                }
            }, 3000);
        }

        function stopMonitoring() {
            clearInterval(pollInterval);
            clearInterval(countdownInterval);
        }

        async function saveAndRedirect(data) {
            const bookingData = {
                guestName: data.guestName,
                guestEmail: data.guestEmail,
                guestPhone: data.guestPhone,
                paymentMethod: data.method,
                paymentStatus: data.method === 'Cash' ? "Pay on Delivery" : "Paid",
                orderDetails: currentOrder, 
                totalAmount: parseFloat(total),
                timestamp: new Date().toISOString(),
                transactionId: Math.floor(100000 + Math.random() * 900000).toString()
            };

            // SYNC LOCAL STORAGE FOR RECEIPT
            localStorage.setItem('lastTransaction', JSON.stringify(bookingData));
            localStorage.setItem('lastReceipt', JSON.stringify({
                ...bookingData,
                date: new Date().toLocaleString(),
                amount: total,
                items: currentOrder.foods || currentOrder
            }));

            try {
                // Background cloud sync
                fetch(`${API_URL}/api/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                
                // Immediate redirect
                window.location.href = 'receipt.html';
            } catch (err) {
                window.location.href = 'receipt.html';
            }
        }
        
        window.onload = () => setMethod('M-Pesa');
    </script>
</body>
</html>
